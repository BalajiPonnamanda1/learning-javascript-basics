<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            position: absolute;
            top: 50%;
            left: 50%;
            /* height: 100vh; */
            transform: translate(-50%,-50%);
            background-color: aquamarine;
            
        }
        #container{
            width: 500px;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: space-around;
            background-color:aqua ;
            border: 2px solid #000;
        }
        .userValue{
            
            display:flex;
            flex-direction: column;
            margin: 8px;
        }
        .box{
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
            padding: 20px;
            background-color: aliceblue;
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <div id="container">
        <div class="userValue">
            <div id="name" class="box"></div>
            <h3>you</h3>
            <div>
                <button onclick="rock()">Rock</button>
                <button onclick="paper()">Paper</button>
                <button onclick="scissor()">scissor</button>
            </div>
        </div>
        <div>
            <div id="compName" class="box"></div>
            <h3>computer</h3>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
